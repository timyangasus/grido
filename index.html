<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#1C1C1E;--s1:#2C2C2E;--s2:#3A3A3C;--bd:#48484A;--t1:#F2F2F7;--t2:#AEAEB2;--t3:#636366;--w:#FFFFFF}
html,body{height:100%;margin:0;padding:0;overflow:hidden;position:fixed;width:100%;}
#app{width:100%;height:100dvh;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;position:relative;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}
.page-container{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;flex-shrink:0}
.nav-title{font-size:17px;font-weight:700;letter-spacing:-.5px}
.nav-icon-btn{background:none;border:none;color:var(--t3);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;-webkit-tap-highlight-color:transparent;}
.nav-icon-btn.on{color:var(--w);}
.nav-icon-btn:active{background:var(--s2);}
.nav-icon-btn svg{width:22px;height:22px;}
.nav-icons{display:flex;align-items:center;gap:10px;}
.nav-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--s1);border-bottom:.5px solid var(--bd);z-index:50;display:none;animation:slideDown .18s ease;}
.nav-dropdown.on{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.nav-icon{background:none;border:none;color:var(--t1);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.nav-icon:active{background:var(--s2)}
.nav-icon svg{width:22px;height:22px}
.nav-icon.dim{opacity:.2;pointer-events:none}
.preview{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;padding:16px 20px;position:relative;min-height:0}
.preview.tap{cursor:pointer}
.preview.tap:active{background:#232325}
.empty-hint{display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--t3);pointer-events:auto;cursor:pointer}
.empty-hint svg{width:72px;height:72px;opacity:.6}
.empty-hint p{font-size:12px;font-weight:500;opacity:.6;letter-spacing:.2px}
#gcWrap{display:none;line-height:0;flex-shrink:0;position:relative;}
.iBtn,.empty-hint{position:relative;}
.real-file-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:5;}
#cellOverlays{position:absolute;inset:0;pointer-events:none;z-index:6;}
.cell-file-label{position:absolute;display:block;cursor:pointer;pointer-events:auto;}
.cell-file-label input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;pointer-events:auto;}
#gc{display:block;border-radius:0;max-width:100%;max-height:100%}
.panels{flex-shrink:0;background:var(--s1);border-top:.5px solid var(--bd)}
.panel{display:none}
.panel.on{display:block}
.abar{display:flex;align-items:center;padding:8px 16px;gap:10px;flex-shrink:0}
.pool-bar{display:flex;align-items:center;padding:6px 12px;gap:6px;flex-shrink:0;border-top:.5px solid var(--bd)}
.pool-count{font-size:12px;color:var(--t2);flex:1}
.pool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;background:#111;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;flex:1;min-height:0;}
.pool-cell{position:relative;background:#2C2C2E;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pool-cell img{position:static;max-width:100%;max-height:100%;width:auto;height:auto;display:block;}
.pool-cell.used .pool-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:1;}
.pool-cell.used::after{content:"✓";position:absolute;right:6px;bottom:6px;width:24px;height:24px;border-radius:50%;background:#fff;color:#000;font-size:15px;line-height:24px;text-align:center;font-weight:700;z-index:2;}
#albumPanel{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.iBtn{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--w)}
.iBtn:active{background:var(--s2)}
.iBtn.dim{opacity:.2;pointer-events:none}
.iBtn svg{width:24px;height:24px}
.acount{flex:1;font-size:11px;color:var(--t1);font-weight:500;text-align:center}
.layout-bar{display:flex;align-items:center;padding:8px 20px 0;background:var(--s1);}
.lgrid{display:flex;flex-wrap:wrap;gap:12px;padding:12px 16px;}
.lthumb{cursor:pointer;opacity:.4;transition:opacity .12s}
.lthumb.on{opacity:1}
.lthumb canvas{display:block}

.rpanel{padding:12px 16px 10px}
.rrow{display:flex;gap:8px}
.rbtn{flex:1;padding:12px 0;border-radius:0;border:1.5px solid var(--bd);background:var(--s2);color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.rbtn.on{background:var(--w);color:#000;border-color:var(--w)}
.tabbar{flex-shrink:0;display:flex;border-top:.5px solid var(--bd);background:var(--s1);padding-bottom:env(safe-area-inset-bottom,0px)}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 4px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:10px;font-weight:500}
.tabbtn.on{color:var(--w)}
.tabbtn svg{width:21px;height:21px}
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#fff;font-size:13px;padding:10px 20px;border-radius:22px;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;z-index:10}
.toast.show{opacity:1}
#panelBorder{display:none;flex-direction:column;width:100%;overflow:hidden;min-height:0;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg)}
#panelBorder.on{display:flex;z-index:5}
.border-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--t3);cursor:pointer}
.border-empty svg{width:72px;height:72px;opacity:.6}
.border-empty p{font-size:12px;font-weight:500;opacity:.6}
.border-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;padding:10px;background:var(--bg);min-height:0}
.border-cell{position:relative;flex:0 0 calc(50% - 3px);aspect-ratio:1;background:var(--s2);overflow:hidden;border-radius:4px}
.border-cell img{width:100%;height:100%;object-fit:contain;display:block}
.border-cell .del-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,0.7);border-radius:50%;border:none;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.border-bar{flex-shrink:0;display:flex;align-items:center;padding:10px 20px;gap:10px;background:var(--s1);border-top:.5px solid var(--bd)}
.pill-btn{background:#000;color:#fff;border:none;border-radius:999px;padding:9px 22px;font-size:14px;font-weight:500;cursor:pointer;margin-left:auto;-webkit-tap-highlight-color:transparent;}
.pill-btn.dim{opacity:.25;pointer-events:none;}
.pill-btn:active{opacity:.7}
.pill-btn.done{background:#1DB954;color:#fff;}
</style>

// ── Helpers ───────────────────────────────────────────────────────────────────
function toRect(f,W,H){
  const x=Math.round(f.x*W),y=Math.round(f.y*H);
  return{x,y,w:Math.round((f.x+f.w)*W)-x,h:Math.round((f.y+f.h)*H)-y};
}
function showToast(msg){

function loadImg(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onerror=rej;
    r.onload=ev=>{const i=new Image();i.onerror=rej;i.onload=()=>res(i);i.src=ev.target.result;};
    r.readAsDataURL(file);
  });
}

function applyPhotos(arr){
  st.photos=arr;

  if(!arr.length){st.layoutIdx=null;return;}

    st.layoutIdx=ALL_LAYOUTS.findIndex(l=>l.n===arr.length);

// ── Render ────────────────────────────────────────────────────────────────────
function drawBorders(c,fracs,W,H,lw){
  c.save();
  c.lineWidth=lw;
  fracs.forEach(f=>{
    const x=Math.round(f.x*W);
    const y=Math.round(f.y*H);
    const w=Math.round((f.x+f.w)*W)-x;
    const h=Math.round((f.y+f.h)*H)-y;
    c.strokeRect(x+lw/2,y+lw/2,w-lw,h-lw);
  });
  c.restore();
}
function showReplaceLabel(cell){
  if(st.layoutIdx===null)return;

  const scaleY=cvRect.height/cvs.height;
  const lbl=document.getElementById('replaceLabel');
  lbl.style.display='block';
  lbl.style.left=(cvRect.left+f.x*cvs.width*scaleX)+'px';
  lbl.style.top=(cvRect.top+f.y*cvs.height*scaleY)+'px';
  lbl.style.width=(f.w*cvs.width*scaleX)+'px';
  lbl.style.height=(f.h*cvs.height*scaleY)+'px';

}

function renderCellOverlays(){

  if (activeTab === 'Border') {
    overlays.style.pointerEvents = 'none';
    return;
  }
  const layout = ALL_LAYOUTS[st.layoutIdx];
  layout.f.forEach((f, i) => {
    if (st.photos[i] !== null) return;
    const lbl = document.createElement('label');
    lbl.className = 'cell-file-label';
    lbl.style.left = (f.x * 100) + '%';
    lbl.style.top = (f.y * 100) + '%';

    const inp = document.createElement('input');

    inp.multiple = true;
    inp.addEventListener('change', async function () {
      const files = Array.from(this.files);
      if (!files.length) return;
      const n = layout.n;
      const nullCells = [];
      for (let k = 0; k < n; k++) {
        const idx = (i + k) % n;
        if (st.photos[idx] === null) {
          nullCells.push(idx);
        }
      }

function render(){
  if(st.layoutIdx===null)return;
  const layout=ALL_LAYOUTS[st.layoutIdx];
  if(layout.n!==st.photos.length)return;
  const{W,H}=CS[st.ratio];
  const area=document.getElementById('preview');
  const style=getComputedStyle(area);
  const padH=parseFloat(style.paddingLeft)+parseFloat(style.paddingRight);
  const padV=parseFloat(style.paddingTop)+parseFloat(style.paddingBottom);
  const availW=area.clientWidth-padH;
  const availH=area.clientHeight-padV;
  const s=Math.min(availW/W,availH/H);
  const dispW=Math.round(W*s);
  const dispH=Math.round(H*s);
  cvs.width=W;cvs.height=H;
  cvs.style.width=dispW+'px';cvs.style.height=dispH+'px';
  ctx.clearRect(0,0,W,H);
  layout.f.forEach((f,i)=>{
    const r=toRect(f,W,H),img=st.photos[i];
    if(img){
      const t=st.transforms[i]||{sc:1,ox:0,oy:0};
      const base=Math.max(r.w/img.width,r.h/img.height);
      const sc=base*t.sc;
      const sw=img.width*sc,sh=img.height*sc;
      const dx=r.x+(r.w-sw)/2+t.ox;
      const dy=r.y+(r.h-sh)/2+t.oy;
      ctx.save();ctx.beginPath();ctx.rect(r.x,r.y,r.w,r.h);ctx.clip();
      ctx.drawImage(img,dx,dy,sw,sh);ctx.restore();
    }else{
      ctx.fillStyle='#2C2C2E';ctx.fillRect(r.x,r.y,r.w,r.h);
    }
  });
  const scale=(parseFloat(cvs.style.width)||W)/W;
  const lw=Math.max(1,Math.ceil(0.8/scale));
  ctx.strokeStyle='#ffffff';drawBorders(ctx,layout.f,W,H,lw);
  if(st.selCell!==null&&st.selCell<layout.f.length){
    const r=toRect(layout.f[st.selCell],W,H);
    const bw=Math.round(3/scale);
    ctx.strokeStyle='#00E5CC';ctx.lineWidth=bw;
    ctx.strokeRect(r.x+bw/2,r.y+bw/2,r.w-bw,r.h-bw);
    const xr=Math.round(10/scale),xpad=Math.round(4/scale);
    const xcx=r.x+r.w-xr-xpad,xcy=r.y+xr+xpad;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.beginPath();ctx.arc(xcx,xcy,xr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=Math.round(1/scale);
    ctx.beginPath();ctx.arc(xcx,xcy,xr,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=Math.round(1.5/scale);const arm=Math.round(3.5/scale);
    ctx.beginPath();ctx.moveTo(xcx-arm,xcy-arm);ctx.lineTo(xcx+arm,xcy+arm);ctx.stroke();
    ctx.beginPath();ctx.moveTo(xcx+arm,xcy-arm);ctx.lineTo(xcx-arm,xcy+arm);ctx.stroke();
  }
  requestAnimationFrame(renderCellOverlays);
}
function renderThumbGrid(){
  const grid=document.getElementById('lgrid');grid.innerHTML='';
  ALL_LAYOUTS.forEach((layout,idx)=>{
    const{W,H}=TS[st.ratio];
    const wrap=document.createElement('div');
    const isOn=idx===st.layoutIdx;
    wrap.className='lthumb'+(isOn?' on':'');
    const tc=document.createElement('canvas');tc.width=W;tc.height=H;tc.style.width=W+'px';tc.style.height=H+'px';
    const tctx=tc.getContext('2d');
    tctx.globalAlpha=isOn?0.85:0.5;
    tctx.strokeStyle='#ffffff';
    drawBorders(tctx,layout.f,W,H,1);
    tctx.globalAlpha=1;
    wrap.appendChild(tc);
    wrap.addEventListener('click',()=>{
      const n=layout.n;
      const realPhotos=st.photos.filter(p=>p!==null);
      // build new photos array: keep real photos up to n, pad rest with null
      let newPhotos;
      if(realPhotos.length<=n){
        newPhotos=[...realPhotos,...new Array(n-realPhotos.length).fill(null)];
      } else {
        newPhotos=realPhotos.slice(0,n);
      }
      // keep transforms for kept photos
      const oldTransforms=st.transforms.filter((_,i)=>st.photos[i]!==null);
      st.photos=newPhotos;
      st.transforms=newPhotos.map((_,i)=>oldTransforms[i]||{sc:1,ox:0,oy:0});
      st.layoutIdx=idx;
      st.selCell=null;
      showCanvas();render();renderThumbGrid();updateAlbumUI();
    });
    grid.appendChild(wrap);
  });
}

// iOS Safari bug: setting input.value='' re-fires the change event.
// Fix: read files + snapshot FIRST, set a lock, defer the value clear.
// ── Pool (photo library cache) ─────────────────────────────────────────────
const pool = []; // {img, usedInCanvas: false}

function poolRender(){
  const grid=document.getElementById('poolGrid');
  if(!grid)return;
  const savedScroll=grid.scrollTop;
  grid.innerHTML='';
  const total=pool.length;
  const used=pool.filter(p=>p.used).length;
  const available=total-used;
  // clear btn
  const clearBtn=document.getElementById('btnPoolClear');
  if(clearBtn) clearBtn.classList.toggle('dim', total===0);
  // canvas slots used
  const canvasUsed=st.photos.filter(p=>p!==null).length;
  pool.forEach((item,i)=>{
    const cell=document.createElement('div');
    cell.className='pool-cell'+(item.used?' used':'');
    const img=document.createElement('img');
    img.src=item.img.src;
    cell.appendChild(img);
    const overlay=document.createElement('div');
    overlay.className='pool-overlay';
    cell.appendChild(overlay);
    // no delete button — pool is a temp library
    cell.addEventListener('click',()=>{
      if(item.used){
        item.used=false;
        cell.classList.remove('used');
        cards.forEach(card=>{
          const ci=card.photos.indexOf(item.img);
          if(ci>=0){card.photos[ci]=null;card.transforms[ci]={sc:1,ox:0,oy:0};}
        });
        requestAnimationFrame(()=>{render();renderCellOverlays();updateAlbumUI();});
        return;
      }
      // ensure layout exists
      if(st.layoutIdx===null){
        st.photos=new Array(6).fill(null);
        st.transforms=st.photos.map(()=>({sc:1,ox:0,oy:0}));
        st.layoutIdx=ALL_LAYOUTS.findIndex(l=>l.n===6);
        st.selCell=null;
      }
      let slot=st.photos.indexOf(null);
      if(slot<0){
        const cur=st.photos.length;
        if(cur>=9){showToast('最多9張');return;}
        st.photos=[...st.photos,null];
        st.transforms=[...st.transforms,{sc:1,ox:0,oy:0}];
        const newN=st.photos.length;
        const li=ALL_LAYOUTS.findIndex(l=>l.n===newN);
        if(li>=0) st.layoutIdx=li;
        slot=st.photos.length-1;
      }
      st.photos[slot]=item.img;
      st.transforms[slot]={sc:1,ox:0,oy:0};
      item.used=true;
      cell.classList.add('used');
      showCanvas();
      requestAnimationFrame(()=>{render();renderCellOverlays();updateAlbumUI();});
    });
    grid.appendChild(cell);
  });
  fixPoolCells();
  requestAnimationFrame(()=>{grid.scrollTop=savedScroll;});
}

function fixPoolCells(){
  requestAnimationFrame(()=>{
    const grid=document.getElementById('poolGrid');
    if(!grid)return;
    // use grid width / 3 accounting for gaps
    const gridW=grid.offsetWidth;
    const cellW=Math.floor((gridW-9)/3); // 3px gap x2 + 3px padding x2
    if(!cellW)return;
    grid.querySelectorAll('.pool-cell').forEach(c=>{
      c.style.width=cellW+'px';
      c.style.height=cellW+'px';
    });
  });
}

function poolAddImgs(imgs, files){
  imgs.forEach((img,i)=>{
    const file=files?files[i]:null;
    const key=file?(file.name+'|'+file.size):null;
    // skip duplicates
    if(key && pool.some(p=>p.key===key)) return;
    pool.push({img, used:false, key});
  });
  poolRender();
}

}

let _addLock=false;
function setupAddInput(id){
  const inp=document.getElementById(id);
  if(!inp)return;
  inp.addEventListener('change',function handleAdd(){
    if(_addLock)return;          // ignore duplicate fire
    if(!this.files.length)return;
    const files=Array.from(this.files);   // snapshot files NOW
    // filter out null placeholders — real photos only
    const before=st.photos.filter(p=>p!==null);
    _addLock=true;
    const self=this;
    setTimeout(()=>{ try{self.value='';}catch(e){} _addLock=false; },100);
    const currentTabNow=document.querySelector('.tabbtn.on')?.dataset.tab;
    if(currentTabNow==='Album'){
      // Album tab: load all selected into pool
      const filesCopy=files.slice();
      Promise.all(files.map(loadImg)).then(imgs=>{
        poolAddImgs(imgs, filesCopy);
      }).catch(()=>{});
    } else {
      // Layout/Ratio tab: fill canvas slots directly
      const layoutMax=st.layoutIdx!==null?ALL_LAYOUTS[st.layoutIdx].n:9;
      const slots=layoutMax-before.length;
      if(slots<=0){showToast('版型已滿');return;}
      Promise.all(files.slice(0,slots).map(loadImg)).then(imgs=>{
        const target=st.layoutIdx!==null?ALL_LAYOUTS[st.layoutIdx].n:imgs.length;
        const merged=[...before,...imgs];
        const padded=[...merged,...new Array(Math.max(0,target-merged.length)).fill(null)];
        st.photos=padded.slice(0,target);
        st.transforms=st.photos.map((_,i)=>st.transforms[i]||{sc:1,ox:0,oy:0});
        showCanvas();render();renderThumbGrid();updateAlbumUI();
      }).catch(()=>{});
    }
  });
}

      let newPhotos;
      if(realPhotos.length<=n){
        newPhotos=[...realPhotos,...new Array(n-realPhotos.length).fill(null)];
      } else {
        newPhotos=realPhotos.slice(0,n);
      }
      const oldTransforms=st.transforms.filter((_,i)=>st.photos[i]!==null);
      st.photos=newPhotos;
      st.transforms=newPhotos.map((_,i)=>oldTransforms[i]||{sc:1,ox:0,oy:0});
      st.layoutIdx=idx;st.selCell=null;
      showCanvas();render();renderThumbGrid();renderThumbGridDrop();updateAlbumUI();
      closeDropdowns();
    });
    grid.appendChild(wrap);
  });
}

// ── Canvas gestures (tap + pinch/drag when cell selected) ────────────────────
(function(){
  // Convert screen point to canvas coords
  function toCanvas(clientX,clientY){
    const rect=cvs.getBoundingClientRect();
    return{
      x:(clientX-rect.left)*cvs.width/rect.width,
      y:(clientY-rect.top)*cvs.height/rect.height
    };
  }
  function hitCell(cx,cy){
    const layout=ALL_LAYOUTS[st.layoutIdx];
    let hit=null;
    layout.f.forEach((f,i)=>{
      const r=toRect(f,cvs.width,cvs.height);
      if(cx>=r.x&&cx<r.x+r.w&&cy>=r.y&&cy<r.y+r.h)hit=i;
    });
    return hit;
  }

  // gesture state
  let gesture=null;
  let _longPressTimer=null;
  let _floatOverlay=null; // {cell, clientX, clientY} for floating drag

  function startLongPressDrag(cell, clientX, clientY){
    if(st.photos[cell]===null)return;
    _floatOverlay={cell, clientX, clientY};
    st.selCell=cell;
    renderWithFloat();
    if(navigator.vibrate) navigator.vibrate(30);
  }

  function renderWithFloat(){
    render();
    if(!_floatOverlay) return;
    const cell=_floatOverlay.cell;
    const img=st.photos[cell];
    if(!img) return;
    const layout=ALL_LAYOUTS[st.layoutIdx];
    const r=toRect(layout.f[cell],cvs.width,cvs.height);
    const t=st.transforms[cell];
    const base=Math.max(r.w/img.width,r.h/img.height);
    const sc=base*t.sc;
    const sw=img.width*sc,sh=img.height*sc;

    // convert client coords to canvas coords
    const rect=cvs.getBoundingClientRect();
    const cx=(_floatOverlay.clientX-rect.left)*cvs.width/rect.width;
    const cy=(_floatOverlay.clientY-rect.top)*cvs.height/rect.height;

    // draw floating cell (80% size, centered on finger)
    const fw=r.w*0.85, fh=r.h*0.85;
    const fx=cx-fw/2, fy=cy-fh/2;
    ctx.save();
    ctx.globalAlpha=0.92;
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=30/((parseFloat(cvs.style.width)||cvs.width)/cvs.width);
    ctx.beginPath();ctx.rect(fx,fy,fw,fh);ctx.clip();
    const fsc=Math.max(fw/img.width,fh/img.height);
    const fsw=img.width*fsc,fsh=img.height*fsc;
    ctx.drawImage(img,fx+(fw-fsw)/2+t.ox*(fw/r.w),fy+(fh-fsh)/2+t.oy*(fh/r.h),fsw,fsh);
    ctx.restore();

    // highlight target cell
    const targetCell=hitCellAt(_floatOverlay.clientX,_floatOverlay.clientY);
    if(targetCell!==null && targetCell!==cell){
      const tr=toRect(layout.f[targetCell],cvs.width,cvs.height);
      const lw=Math.max(2,Math.ceil(2/((parseFloat(cvs.style.width)||cvs.width)/cvs.width)));
      ctx.save();
      ctx.strokeStyle='#ffffff';ctx.lineWidth=lw*2;ctx.globalAlpha=0.6;
      ctx.strokeRect(tr.x+lw,tr.y+lw,tr.w-lw*2,tr.h-lw*2);
      ctx.restore();
    }
  }

  function hitCellAt(clientX,clientY){
    const p=toCanvas(clientX,clientY);
    return hitCell(p.x,p.y);
  }

  cvs.addEventListener('touchstart',e=>{
    if(st.layoutIdx===null)return;
    e.preventDefault();
    const touches=e.touches;
    if(touches.length===1){
      const p=toCanvas(touches[0].clientX,touches[0].clientY);
      const layout=ALL_LAYOUTS[st.layoutIdx];
      const scale=(parseFloat(cvs.style.width)||cvs.width)/cvs.width;
      // check X button on selected cell
      if(st.selCell!==null){
        const r=toRect(layout.f[st.selCell],cvs.width,cvs.height);
        const xr=Math.round(10/scale),xpad=Math.round(4/scale);
        const xcx=r.x+r.w-xr-xpad,xcy=r.y+xr+xpad;
        if(Math.hypot(p.x-xcx,p.y-xcy)<=xr*1.8){
          const delImg=st.photos[st.selCell];
          const np=[...st.photos];np.splice(st.selCell,1);
          const nt=[...st.transforms];nt.splice(st.selCell,1);
          st.transforms=nt;
          applyPhotos(np);
          if(delImg) poolReturn(delImg);
          if(!st.photos.length){hideCanvas();document.getElementById('lgrid').innerHTML='';}
          else{render();renderThumbGrid();}
          updateAlbumUI();gesture=null;return;
        }
      }
      const cell=hitCell(p.x,p.y);
      if(cell===null){st.selCell=null;render();gesture=null;return;}
      if(st.photos[cell]===null){gesture=null;return;} // overlay handles null cells

      // start long press timer for drag-to-swap
      _longPressTimer=setTimeout(()=>{
        _longPressTimer=null;
        gesture={mode:'reorder',cell,clientX:touches[0].clientX,clientY:touches[0].clientY};
        startLongPressDrag(cell,touches[0].clientX,touches[0].clientY);
      },400);

      if(st.selCell===cell){
        gesture={mode:'drag',cell,
          startX:p.x,startY:p.y,
          startOx:st.transforms[cell].ox,
          startOy:st.transforms[cell].oy,
          isTap:true};
      } else {
        st.selCell=cell;render();gesture=null;
      }
    } else if(touches.length===2&&st.selCell!==null){
      clearTimeout(_longPressTimer);_longPressTimer=null;_floatOverlay=null;
      const p1=toCanvas(touches[0].clientX,touches[0].clientY);
      const p2=toCanvas(touches[1].clientX,touches[1].clientY);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      gesture={mode:'pinch',cell:st.selCell,
        startDist:dist,
        startSc:st.transforms[st.selCell].sc,
        startOx:st.transforms[st.selCell].ox,
        startOy:st.transforms[st.selCell].oy,
        midX:(p1.x+p2.x)/2,midY:(p1.y+p2.y)/2};
    }
  },{passive:false});

  cvs.addEventListener('touchmove',e=>{
    e.preventDefault();
    const touches=e.touches;
    if(_longPressTimer){clearTimeout(_longPressTimer);_longPressTimer=null;}
    if(!gesture)return;
    const t=st.transforms[gesture.cell];
    const layout=ALL_LAYOUTS[st.layoutIdx];
    const r=toRect(layout.f[gesture.cell],cvs.width,cvs.height);

    if(gesture.mode==='reorder'&&touches.length>=1){
      _floatOverlay={cell:gesture.cell,clientX:touches[0].clientX,clientY:touches[0].clientY};
      renderWithFloat();
    } else if(gesture.mode==='drag'&&touches.length>=1){
      const p=toCanvas(touches[0].clientX,touches[0].clientY);
      let ox=gesture.startOx+(p.x-gesture.startX);
      let oy=gesture.startOy+(p.y-gesture.startY);
      const img=st.photos[gesture.cell];
      const base=Math.max(r.w/img.width,r.h/img.height);
      const sc=base*t.sc;
      const sw=img.width*sc,sh=img.height*sc;
      const maxOx=(sw-r.w)/2,maxOy=(sh-r.h)/2;
      ox=Math.max(-maxOx,Math.min(maxOx,ox));
      oy=Math.max(-maxOy,Math.min(maxOy,oy));
      t.ox=ox;t.oy=oy;
      gesture.isTap=false;
      render();
    } else if(gesture.mode==='pinch'&&touches.length>=2){
      const p1=toCanvas(touches[0].clientX,touches[0].clientY);
      const p2=toCanvas(touches[1].clientX,touches[1].clientY);
      const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      let sc=gesture.startSc*(dist/gesture.startDist);
      sc=Math.max(1,Math.min(4,sc));
      t.sc=sc;
      const img=st.photos[gesture.cell];
      const base=Math.max(r.w/img.width,r.h/img.height);
      const sw=img.width*base*sc,sh=img.height*base*sc;
      const maxOx=(sw-r.w)/2,maxOy=(sh-r.h)/2;
      t.ox=Math.max(-maxOx,Math.min(maxOx,t.ox));
      t.oy=Math.max(-maxOy,Math.min(maxOy,t.oy));
      render();
    }
  },{passive:false});

  cvs.addEventListener('touchend',e=>{
    e.preventDefault();
    clearTimeout(_longPressTimer);_longPressTimer=null;
    if(gesture&&gesture.mode==='drag'&&gesture.isTap){
      const cell=gesture.cell;
      gesture=null;_floatOverlay=null;
      showReplaceLabel(cell);
      return;
    }
    if(gesture&&gesture.mode==='reorder'){
      const touch=e.changedTouches[0];
      const targetCell=hitCellAt(touch.clientX,touch.clientY);
      _floatOverlay=null;
      if(targetCell!==null&&targetCell!==gesture.cell&&st.photos[targetCell]!==null){
        swapCells(gesture.cell,targetCell);
      } else {
        render();
      }
    }
    gesture=null;
    _floatOverlay=null;
  },{passive:false});

  // Mouse fallback (desktop)
  let mouseDrag=null;
  cvs.addEventListener('mousedown',e=>{
    if(st.layoutIdx===null||st.selCell===null)return;
    const p=toCanvas(e.clientX,e.clientY);
    const cell=hitCell(p.x,p.y);
    if(cell!==st.selCell)return;
    mouseDrag={cell,startX:p.x,startY:p.y,
      startOx:st.transforms[cell].ox,startOy:st.transforms[cell].oy};
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!mouseDrag)return;
    const p=toCanvas(e.clientX,e.clientY);
    const t=st.transforms[mouseDrag.cell];
    const layout=ALL_LAYOUTS[st.layoutIdx];
    const r=toRect(layout.f[mouseDrag.cell],cvs.width,cvs.height);
    const img=st.photos[mouseDrag.cell];
    const base=Math.max(r.w/img.width,r.h/img.height);
    const sw=img.width*base*t.sc,sh=img.height*base*t.sc;
    const maxOx=(sw-r.w)/2,maxOy=(sh-r.h)/2;
    let ox=mouseDrag.startOx+(p.x-mouseDrag.startX);
    let oy=mouseDrag.startOy+(p.y-mouseDrag.startY);
    t.ox=Math.max(-maxOx,Math.min(maxOx,ox));
    t.oy=Math.max(-maxOy,Math.min(maxOy,oy));
    render();
  });
  window.addEventListener('mouseup',()=>{mouseDrag=null;});

  // Click: only for non-touch (select/deselect/X/replace)
  cvs.addEventListener('click',e=>{
    if(e.sourceCapabilities&&e.sourceCapabilities.firesTouchEvents)return;
    if(st.layoutIdx===null)return;
    const p=toCanvas(e.clientX,e.clientY);
    const layout=ALL_LAYOUTS[st.layoutIdx];
    const scale=(parseFloat(cvs.style.width)||cvs.width)/cvs.width;
    if(st.selCell!==null){
      const r=toRect(layout.f[st.selCell],cvs.width,cvs.height);
      const xr=Math.round(10/scale),xpad=Math.round(4/scale);
      const xcx=r.x+r.w-xr-xpad,xcy=r.y+xr+xpad;
      if(Math.hypot(p.x-xcx,p.y-xcy)<=xr*1.5){
        const delImg2=st.photos[st.selCell];
        const np=[...st.photos];np.splice(st.selCell,1);
        const nt=[...st.transforms];nt.splice(st.selCell,1);
        st.transforms=nt;
        applyPhotos(np);
        if(delImg2) poolReturn(delImg2);
        if(!st.photos.length){hideCanvas();document.getElementById('lgrid').innerHTML='';}
        else{render();renderThumbGrid();}
        updateAlbumUI();return;
      }
    }
    const cell=hitCell(p.x,p.y);
    if(cell===null){st.selCell=null;render();return;}
    if(st.photos[cell]===null){return;} // overlay handles null cells
    if(st.selCell===cell){showReplaceLabel(cell);}
    else{st.selCell=cell;render();}
  });

  document.getElementById('preview').addEventListener('click',e=>{
    if(e.target===cvs)return;
    hideReplaceLabel();
    if(st.selCell!==null){st.selCell=null;render();}
  });
})();

document.getElementById('btnExport').addEventListener('click',async()=>{
  const doneCards=cards.filter(c=>c.done&&c.photos.some(p=>p!==null));
  if(!doneCards.length){showToast('沒有完成的拼圖');return;}
  showToast('處理中...');
  const filesToExport=[];
  for(let ci=0;ci<doneCards.length;ci++){
    const card=doneCards[ci];
    const layout=ALL_LAYOUTS[card.layoutIdx];
    const{W,H}=CS[st.ratio];
    const ec=document.createElement('canvas');ec.width=W;ec.height=H;
    const ectx=ec.getContext('2d');
    layout.f.forEach((f,i)=>{
      const r=toRect(f,W,H),img=card.photos[i];
      if(img){
        const t=card.transforms[i]||{sc:1,ox:0,oy:0};
        const base=Math.max(r.w/img.width,r.h/img.height);
        const sc=base*t.sc;
        const sw=img.width*sc,sh=img.height*sc;
        const dx=r.x+(r.w-sw)/2+t.ox;
        const dy=r.y+(r.h-sh)/2+t.oy;
        ectx.save();ectx.beginPath();ectx.rect(r.x,r.y,r.w,r.h);ectx.clip();
        ectx.drawImage(img,dx,dy,sw,sh);ectx.restore();
      }else{ectx.fillStyle='#2C2C2E';ectx.fillRect(r.x,r.y,r.w,r.h);}
    });
    ectx.strokeStyle='#ffffff';drawBorders(ectx,layout.f,W,H,6);
    const blob=await new Promise(res=>ec.toBlob(res,'image/jpeg',0.95));
    if(blob) filesToExport.push(new File([blob],'grido_'+(ci+1)+'.jpg',{type:'image/jpeg'}));
  }
  try{
    if(navigator.canShare&&navigator.canShare({files:filesToExport})){
      await navigator.share({files:filesToExport,title:'Grido'});
    } else {
      filesToExport.forEach(f=>{
        const url=URL.createObjectURL(f);
        const a=document.createElement('a');a.href=url;a.download=f.name;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),3000);
      });
      showToast('已下載');
    }
  }catch(e){if(e.name!=='AbortError')showToast('輸出失敗');}
});

const bst={photos:[],selected:null}; // border state

function bUpdateUI(){

function bRenderGrid(){

    const cell=document.createElement('div');

    const im=document.createElement('img');

    cell.appendChild(im);

// fb input: load photos for border
(function(){
  function setupFb(id){
    const inp=document.getElementById(id);
    if(!inp)return;
    let _lock=false;
    inp.addEventListener('change',function(){
      if(_lock)return;
      const files=Array.from(this.files);
      const before=bst.photos.slice();
      _lock=true;
      const self=this;
      setTimeout(()=>{try{self.value='';}catch(e){}_lock=false;},100);
      if(!files.length)return;
      Promise.all(files.map(f=>new Promise((res,rej)=>{
        const r=new FileReader();
        r.onerror=rej;
        r.onload=ev=>{const i=new Image();i.onerror=rej;i.onload=()=>res(i);i.src=ev.target.result;};
        r.readAsDataURL(f);
      }))).then(imgs=>{
        bst.photos=[...before,...imgs];
        bRenderGrid();bUpdateUI();
      }).catch(()=>{});
    });
  }
  setupFb('fb');
  setupFb('fb2');
})();

// export: add white border to each photo and share
document.getElementById('btnExportBorder').addEventListener('click', async () => {
  if (!bst.photos.length) {
    showToast('沒有照片');
    return;
  }
  showToast('處理中...');
  const SIZE = 3000;
  const BORDER = Math.round(SIZE * 0.03);
  const inner = SIZE - BORDER * 2;
  const filesToShare = [];
  for (let i = 0; i < bst.photos.length; i++) {
    const img = bst.photos[i];
    const ec = document.createElement('canvas');
    ec.width = SIZE;
    ec.height = SIZE;
    const ectx = ec.getContext('2d');
    ectx.fillStyle = '#ffffff';
    ectx.fillRect(0, 0, SIZE, SIZE);
    const sc = Math.min(inner / img.width, inner / img.height);
    const sw = img.width * sc;
    const sh = img.height * sc;
    const dx = BORDER + (inner - sw) / 2;
    const dy = BORDER + (inner - sh) / 2;
    ectx.drawImage(img, dx, dy, sw, sh);
    const blob = await new Promise(resolve => {
      ec.toBlob(resolve, 'image/jpeg', 0.95);
    });
    if (!blob) {
      showToast('輸出失敗');
      return;
    }
    filesToShare.push(
      new File(
        [blob],
        `grido_border_${i + 1}.jpg`,
        { type: 'image/jpeg' }
      )
    );
  }
  try {
    if (
      navigator.canShare &&
      navigator.canShare({ files: filesToShare })
    ) {
      await navigator.share({
        files: filesToShare,
        title: 'Grido'
      });
    } else {
      filesToShare.forEach(file => {
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 3000);
      });
      showToast('已下載');
    }
    bst.photos = [];
    bRenderGrid();
    bUpdateUI();
  } catch (e) {
    if (e.name !== 'AbortError') {
      showToast('輸出失敗');
    }
  }
});
